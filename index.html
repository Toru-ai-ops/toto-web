<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="toto">
  <meta name="theme-color" content="#131e2f">
  <title>toto</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <header class="app-header">
    <span class="app-logo">toto</span>
    <span id="headerDate" class="header-date"></span>
  </header>

  <!-- Tasks Panel -->
  <div id="panelTasks" class="panel active">
    <div class="status-bar-row">
      <button class="status-btn active" onclick="filterStatus('未完成', this)">未完成</button>
      <button class="status-btn" onclick="filterStatus('已完成', this)">已完成</button>
    </div>
    <div class="cat-scroll">
      <button class="cat-chip active" data-cat="全部" onclick="filterTasks(this)">全部</button>
      <button class="cat-chip" data-cat="工作任務" onclick="filterTasks(this)">💼 工作</button>
      <button class="cat-chip" data-cat="學習計畫" onclick="filterTasks(this)">📚 學習</button>
      <button class="cat-chip" data-cat="生活作息" onclick="filterTasks(this)">🌱 生活</button>
      <button class="cat-chip" data-cat="個人待辦" onclick="filterTasks(this)">⭐ 個人</button>
    </div>
    <div id="taskList" class="list-area">
      <div class="loading">載入中...</div>
    </div>
    <div class="add-bar">
      <input type="text" id="taskInput" class="add-input" placeholder="新增待辦...">
      <select id="taskCat" class="add-select">
        <option value="工作任務">💼 工作</option>
        <option value="學習計畫">📚 學習</option>
        <option value="生活作息">🌱 生活</option>
        <option value="個人待辦" selected>⭐ 個人</option>
      </select>
      <button class="add-btn" onclick="addTask()">＋</button>
    </div>
  </div>

  <!-- Accounting Panel -->
  <div id="panelAccounting" class="panel">
    <div class="nav-bar">
      <div class="nav-modes">
        <button class="nav-mode-btn" onclick="setAcctMode('day',this)">日</button>
        <button class="nav-mode-btn active" onclick="setAcctMode('month',this)">月</button>
        <button class="nav-mode-btn" onclick="setAcctMode('year',this)">年</button>
      </div>
      <div class="nav-ctrl">
        <button class="nav-arrow" onclick="acctNav(-1)">‹</button>
        <span class="nav-lbl" id="acctNavLbl"></span>
        <button class="nav-arrow" onclick="acctNav(1)">›</button>
      </div>
    </div>
    <div class="acct-summary">
      <div class="sum-item">
        <span class="sum-label">收入</span>
        <span id="sumIncome" class="sum-val inc">0</span>
      </div>
      <div class="sum-sep"></div>
      <div class="sum-item">
        <span class="sum-label">支出</span>
        <span id="sumExpense" class="sum-val exp">0</span>
      </div>
      <div class="sum-sep"></div>
      <div class="sum-item">
        <span class="sum-label">結餘</span>
        <span id="sumBalance" class="sum-val">0</span>
      </div>
    </div>
    <div id="acctList" class="list-area">
      <div class="empty-hint">尚無記帳記錄</div>
    </div>
    <div class="add-bar">
      <div class="type-toggle">
        <button id="btnExp" class="type-btn exp active" onclick="setType('expense')">支出</button>
        <button id="btnInc" class="type-btn inc" onclick="setType('income')">收入</button>
      </div>
      <input type="number" id="acctAmt" class="add-input amt-input" placeholder="金額">
      <select id="acctCat" class="add-select"></select>
      <button class="add-btn" onclick="addEntry()">＋</button>
    </div>
    <div class="add-bar add-bar2">
      <input type="text" id="acctNote" class="add-input" placeholder="備註（選填）">
      <input type="date" id="acctDate" class="add-select date-input">
    </div>
  </div>

  <!-- Fitness Panel -->
  <div id="panelFitness" class="panel">
    <div class="nav-bar">
      <div class="nav-modes">
        <button class="nav-mode-btn" onclick="setFitMode('day',this)">日</button>
        <button class="nav-mode-btn active" onclick="setFitMode('month',this)">月</button>
        <button class="nav-mode-btn" onclick="setFitMode('year',this)">年</button>
      </div>
      <div class="nav-ctrl">
        <button class="nav-arrow" onclick="fitNav(-1)">‹</button>
        <span class="nav-lbl" id="fitNavLbl"></span>
        <button class="nav-arrow" onclick="fitNav(1)">›</button>
      </div>
    </div>
    <div id="fitList" class="list-area">
      <div class="loading">載入中...</div>
    </div>
    <div class="add-bar">
      <input type="text" id="fitExercise" class="add-input" placeholder="動作名稱">
      <button class="add-btn" onclick="addFitEntry()">＋</button>
    </div>
    <div class="add-bar add-bar2">
      <input type="number" id="fitSets" class="add-input" style="max-width:62px" placeholder="組數">
      <input type="number" id="fitReps" class="add-input" style="max-width:62px" placeholder="次數">
      <input type="number" id="fitWeight" class="add-input" style="max-width:80px" placeholder="重量 kg">
      <input type="text" id="fitNote" class="add-input" placeholder="備註（選填）">
      <input type="date" id="fitDate" class="add-select date-input">
    </div>
  </div>

  <!-- Notes Panel -->
  <div id="panelNotes" class="panel">
    <div class="notes-area">
      <textarea id="notesText" class="notes-textarea" placeholder="開始記錄..." oninput="onNotesInput()" maxlength="500"></textarea>
      <div class="notes-char-count"><span id="notesCharCount">0</span> / 500</div>
    </div>
    <div class="notes-nav">
      <button class="nav-arrow" id="notesPrev" onclick="notesNav(-1)">‹</button>
      <span class="notes-page-info">第 <span id="notesPageNum">1</span> 頁 / 共 <span id="notesPageTotal">1</span> 頁</span>
      <button class="nav-arrow" id="notesNext" onclick="notesNav(1)">›</button>
    </div>
  </div>

  <!-- Tab Bar -->
  <nav class="tab-bar">
    <button class="tab-item active" onclick="switchTab('tasks', this)">
      <span class="tab-icon">📋</span>
      <span>待辦</span>
    </button>
    <button class="tab-item" onclick="switchTab('accounting', this)">
      <span class="tab-icon">💰</span>
      <span>記帳</span>
    </button>
    <button class="tab-item" onclick="switchTab('fitness', this)">
      <span class="tab-icon">🏋️</span>
      <span>訓練</span>
    </button>
    <button class="tab-item" onclick="switchTab('notes', this)">
      <span class="tab-icon">📝</span>
      <span>記事本</span>
    </button>
  </nav>

  <script src="/app.js"></script>
</body>
</html>
